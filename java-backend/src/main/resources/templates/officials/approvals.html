<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Barangay Information Management System - Official Approvals</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div th:replace="~{fragments/nav :: topnav}"></div>
<main class="container">
    <h1>Official Approvals</h1>

    <div class="alert error" th:if="${error}" th:text="${error}"></div>
    <div class="alert success" th:if="${success}" th:text="${success}"></div>

    <section class="card">
        <h3>Pending Official Accounts</h3>
        <p class="muted" th:if="${#lists.isEmpty(pendingOfficials)}">No pending official accounts.</p>
        <table th:if="${!#lists.isEmpty(pendingOfficials)}">
            <thead>
            <tr>
                <th>Username</th>
                <th>Full Name</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="official : ${pendingOfficials}">
                <td th:text="${official.username}">username</td>
                <td th:text="${official.fullName}">full name</td>
                <td>
                    <form th:action="@{'/officials/' + ${official.id} + '/approve'}" method="post">
                        <button type="submit">Approve</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
