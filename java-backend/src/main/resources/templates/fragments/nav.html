<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="topnav" class="topnav">
    <a href="/" class="brand">
        <img
            class="brand-logo"
            src="/images/logo.png"
            alt="Barangay Information Management System logo"
        >
        <span class="brand-text">Barangay Information Management System</span>
    </a>
    <div class="links">
        <a href="/" th:if="${role != 'RESIDENT'}">Dashboard</a>
        <a href="/profile">My Profile</a>
        <a href="/ayuda/request" th:text="${role == 'RESIDENT' ? 'Request Ayuda' : 'Add Ayuda'}">Request Ayuda</a>
        <a href="/blotter">Blotter</a>
        <a href="/schedule" th:if="${canApproveOfficials}">Add Schedule</a>
        <a href="/residents" th:if="${canApproveOfficials}">Residents</a>
        <a href="/officials/approvals" th:if="${canApproveOfficials}">Official Approvals</a>
    </div>
    <form method="post" action="/logout">
        <button type="submit">Logout</button>
    </form>
</nav>
</body>
</html>
