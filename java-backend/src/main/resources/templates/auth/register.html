<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Barangay Information Management System - Register</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="auth-bg">
<main class="auth-wrap">
    <section class="card auth-card">
        <img
            class="auth-logo"
            src="/images/logo.png"
            alt="Barangay Information Management System logo"
        >
        <h1>Barangay Information Management System</h1>
        <p class="muted">Create a resident or barangay official account.</p>
        <p class="tiny">New official accounts must be approved by an approved official before login.</p>

        <div class="alert error" th:if="${error}" th:text="${error}"></div>

        <form method="post" action="/register">
            <label>Account Type</label>
            <select name="role" required>
                <option value="RESIDENT" th:selected="${selectedRole == 'RESIDENT'}">Resident</option>
                <option value="OFFICIAL" th:selected="${selectedRole == 'OFFICIAL'}">Barangay Official</option>
            </select>

            <label>Username</label>
            <input name="username" required>

            <label>Full Name</label>
            <input name="fullName" required>

            <label>Password</label>
            <input name="password" type="password" required minlength="6">

            <label>Confirm Password</label>
            <input name="confirmPassword" type="password" required minlength="6">

            <button type="submit">Register</button>
        </form>

        <p class="tiny">Already have an account? <a href="/login">Login</a></p>
    </section>
</main>
</body>
</html>
